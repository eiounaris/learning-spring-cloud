spring:
  application:
    name: user-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: public
        group: DEFAULT_GROUP

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics  # 暴露哪些端点，写 "*" 则是全部
