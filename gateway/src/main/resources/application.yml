server:
  port: 9090 # 网关统一入口端口

spring:
  application:
    name: gateway
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: public
        group: DEFAULT_GROUP
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true             # 开启动态路由：自动为 Nacos 中的每个服务创建路由
              lower-case-service-id: true  # 服务名转为小写路径前缀
          routes:
            # 以下为手动路由配置（在自动路由基础上可以做更细粒度控制）
            - id: user-service
              uri: lb://user-service    # lb:// 表示使用 LoadBalancer 从 Nacos 选取实例
              predicates:
                - Path=/user/**         # 以 /user 开头的请求转发到 user-service
              filters:
                - StripPrefix=1         # 去掉 /user 前缀再转发
            - id: nacos-demo
              uri: lb://nacos-demo
              predicates:
                - Path=/nacos/**
              filters:
                - StripPrefix=1         # 去掉 /nacos 前缀再转发

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
